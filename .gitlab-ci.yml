stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend
  ADMIN_IMAGE: $CI_REGISTRY_IMAGE/admin

# ---------------------------------------------------------------------------
# Build stage – builds & pushes Docker images to GitLab Container Registry
# ---------------------------------------------------------------------------

build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $BACKEND_IMAGE:latest ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BACKEND_IMAGE:latest
  only:
    - main

build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg VITE_API_URL=$VITE_API_URL
        --build-arg VITE_BOT_USERNAME=$VITE_BOT_USERNAME
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $FRONTEND_IMAGE:latest
        ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
  only:
    - main

build-admin:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg VITE_API_URL=$VITE_API_URL
        -t $ADMIN_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $ADMIN_IMAGE:latest
        ./admin
    - docker push $ADMIN_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $ADMIN_IMAGE:latest
  only:
    - main

# ---------------------------------------------------------------------------
# Deploy stage – SSH into production, pull new images, restart services
# ---------------------------------------------------------------------------

deploy-production:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "
        cd $PROJECT_DIR &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $BACKEND_IMAGE:latest &&
        docker pull $FRONTEND_IMAGE:latest &&
        docker pull $ADMIN_IMAGE:latest &&
        docker compose -f docker-compose.prod.yml up -d --no-build &&
        docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head &&
        docker image prune -f
      "
  only:
    - main
  when: manual
  environment:
    name: production
