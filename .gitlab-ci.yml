stages:
  - build

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# ---------------------------------------------------------------------------
# Build stage – builds & pushes Docker images to GitLab Container Registry
# Tags: :latest and :$CI_COMMIT_SHORT_SHA
# Deploy manually on VPS:
#   cd /home/redman/yewaledoch
#   docker compose -f docker-compose.coolify.yml build --no-cache yewaledoch-api yewaledoch-web
#   docker compose -f docker-compose.coolify.yml up -d yewaledoch-api yewaledoch-web
# ---------------------------------------------------------------------------

build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $BACKEND_IMAGE:latest ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BACKEND_IMAGE:latest
  only:
    - master

build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg VITE_API_URL=$VITE_API_URL
        --build-arg VITE_BOT_USERNAME=$VITE_BOT_USERNAME
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $FRONTEND_IMAGE:latest
        ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
  only:
    - master

