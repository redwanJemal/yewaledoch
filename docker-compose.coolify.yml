services:
  yewaledoch-db:
    container_name: yewaledoch-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yewaledoch}
      POSTGRES_USER: ${POSTGRES_USER:-yewaledoch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yewaledoch}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  yewaledoch-redis:
    container_name: yewaledoch-redis
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  yewaledoch-api:
    container_name: yewaledoch-api
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-yewaledoch}:${POSTGRES_PASSWORD}@yewaledoch-db:5432/${POSTGRES_DB:-yewaledoch}
      REDIS_URL: redis://yewaledoch-redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      BOT_NAME: ${BOT_NAME:-YeWaledoch}
      BOT_DESCRIPTION: ${BOT_DESCRIPTION:-የኢትዮጵያ ወላጆች ማህበረሰብ — ልምድ ይጋሩ፣ ምክር ያግኙ}
      BOT_SHORT_DESCRIPTION: ${BOT_SHORT_DESCRIPTION:-Ethiopian Parenting Community}
      MINI_APP_URL: ${MINI_APP_URL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-yewaledoch}
    depends_on:
      yewaledoch-db:
        condition: service_healthy
      yewaledoch-redis:
        condition: service_healthy
    networks:
      - internal

  yewaledoch-web:
    container_name: yewaledoch-web
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_BOT_USERNAME: ${VITE_BOT_USERNAME:-${BOT_USERNAME}}
    depends_on:
      - yewaledoch-api
    networks:
      - internal
      - coolify

volumes:
  pgdata:

networks:
  internal:
  coolify:
    external: true
