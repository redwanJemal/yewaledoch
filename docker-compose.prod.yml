services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: yewaledoch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yewaledoch-internal

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: yewaledoch-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yewaledoch-internal

  # FastAPI Backend
  backend:
    image: ${CI_REGISTRY_IMAGE:-yewaledoch}/backend:${IMAGE_TAG:-latest}
    build: ./backend
    container_name: yewaledoch-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_USERNAME=${BOT_USERNAME}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEBUG=false
      - CORS_ORIGINS=${CORS_ORIGINS}
      - APP_URL=${APP_URL}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-yewaledoch}
      - MINI_APP_URL=${MINI_APP_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - yewaledoch-internal
      - coolify

  # React Frontend (Telegram Mini App)
  frontend:
    image: ${CI_REGISTRY_IMAGE:-yewaledoch}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_BOT_USERNAME=${VITE_BOT_USERNAME}
    container_name: yewaledoch-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - yewaledoch-internal
      - coolify

  # Admin Backoffice (separate SPA)
  admin:
    image: ${CI_REGISTRY_IMAGE:-yewaledoch}/admin:${IMAGE_TAG:-latest}
    build:
      context: ./admin
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: yewaledoch-admin
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - yewaledoch-internal
      - coolify

volumes:
  postgres_data:
  redis_data:

networks:
  yewaledoch-internal:
    driver: bridge
  coolify:
    external: true
